# Minimal dual-agent loop config
# Required: workspace, model, max_iterations, master_instructions, task

task_id: my-task
workspace: .
model: auto
max_iterations: 40
backend: sdk

# Default: agents may write anywhere under workspace
write_roots:
  - .

# off (default): no hard shell denylist; soft safety lives in safety_guidelines
# soft: same as off for hooks
# strict: enable hard denylist (git push, rm -rf /, DROP TABLE, ...)
safety_mode: "off"
safety_guidelines: default   # or path to a markdown file
escalate_policy: default     # or path to a markdown file

# File 1: master context / how the master should think
master_instructions: auto/runs/my-task/instruction_for_master

# File 2: task the master uses to drive the developer (path or inline text)
task: auto/runs/my-task/instruction_for_master_to_guide_developer

initial_instruction: |
  Start with the first coherent step for this task.

owner_reply: null
run_dir: null   # default: auto/runs/<task_id>

notify:
  write_needs_owner: true
  webhook_url: null

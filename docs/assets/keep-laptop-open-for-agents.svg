<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Keep your agents running 24/7 — satirical propped laptop">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5efe6"/>
      <stop offset="100%" stop-color="#e7dccb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#desk)"/>
  <text x="640" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="54" font-weight="700" fill="#111">Keep your agents running 24/7.</text>
  <!-- red scribble circle -->
  <ellipse cx="640" cy="400" rx="390" ry="230" fill="none" stroke="#e11d48" stroke-width="10" stroke-linecap="round" opacity="0.85" transform="rotate(-3 640 400)"/>
  <path d="M980 250 C1040 300, 1060 360, 1020 420" fill="none" stroke="#e11d48" stroke-width="8" stroke-linecap="round"/>
  <polygon points="1020,420 990,395 1015,385" fill="#e11d48"/>
  <!-- laptop base -->
  <g filter="url(#shadow)">
    <rect x="320" y="430" width="640" height="28" rx="6" fill="#c5c9ce"/>
    <rect x="300" y="456" width="680" height="18" rx="4" fill="#9aa0a6"/>
    <!-- screen slightly open -->
    <path d="M360 430 L400 250 L880 250 L920 430 Z" fill="#1f2937"/>
    <path d="M420 265 L860 265 L890 415 L390 415 Z" fill="#0ea5e9" opacity="0.25"/>
    <text x="640" y="350" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" fill="#e2e8f0">agent.run() … still going</text>
  </g>
  <!-- colorful claw props -->
  <g>
    <path d="M430 448 L445 400 L460 448 Z" fill="#38bdf8"/>
    <rect x="428" y="445" width="34" height="14" rx="3" fill="#0ea5e9"/>
    <path d="M560 448 L575 395 L590 448 Z" fill="#c084fc"/>
    <rect x="558" y="445" width="34" height="14" rx="3" fill="#a855f7"/>
    <path d="M700 448 L715 392 L730 448 Z" fill="#fb923c"/>
    <rect x="698" y="445" width="34" height="14" rx="3" fill="#f97316"/>
    <path d="M820 448 L835 398 L850 448 Z" fill="#4ade80"/>
    <rect x="818" y="445" width="34" height="14" rx="3" fill="#22c55e"/>
  </g>
  <text x="640" y="560" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#334155">Official workflow: prop the lid · pray Wi‑Fi holds · don’t close the laptop</text>
  <text x="640" y="610" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="600" fill="#0f172a">Or… run headless on a remote server and sleep.</text>
  <text x="640" y="665" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#64748b">Satirical illustration for cursor-dual-agent-loop · not a real product</text>
</svg>

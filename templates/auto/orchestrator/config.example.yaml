# Dual-agent loop config

# =============================================================================
# Should be configured by the user
# =============================================================================

task_id: my-task
workspace: .

# Shared default when developer_model / master_model are omitted
# Exact ids: python auto/orchestrator/list_models.py
model: auto

# Cost tip: put a stronger (often more expensive) model on the master for review
# quality, and keep the developer on auto / a cheaper model for execution volume.
# developer_model: auto
# master_model: composer-2.5   # example — use any Cursor model id you prefer

# Orchestrator hard-stop only — never shown to the master as a completion budget
max_iterations: 40

master_instructions: auto/runs/my-task/instruction_for_master
task: auto/runs/my-task/instruction_for_master_to_guide_developer

# =============================================================================
# Default parameters (safe to leave as-is; override when needed)
# =============================================================================

backend: sdk

write_roots:
  - .

safety_mode: "off"
safety_guidelines: default
escalate_policy: default

test_command: null
lint_command: null

owner_reply: null

notify:
  write_needs_owner: true
  webhook_url: null

# Logs, notifications, and run_state.yaml (agent IDs / last_iteration) live here
run_dir: null
